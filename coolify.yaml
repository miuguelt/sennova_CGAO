# ==========================================
# SENNOVA CGAO - Coolify Configuration v4
# Archivo de configuración para Coolify v4+
# ==========================================

# Información del proyecto
name: sennova-cgao
version: 2.0.0
description: Sistema de Gestión de Proyectos de Investigación SENNOVA CGAO

# Tipo de servicio
type: docker-compose

# Servicios
docker_compose_file: docker-compose.yml

# Variables de entorno requeridas
environment:
  required:
    - DB_PASSWORD
    - JWT_SECRET
  optional:
    - ALLOWED_ORIGINS
    - VITE_API_URL
    - INITIAL_ADMIN_EMAIL
    - INITIAL_ADMIN_PASSWORD
    - PGADMIN_EMAIL
    - PGADMIN_PASSWORD

# Volúmenes persistentes (se configuran automáticamente en Coolify)
persistent_volumes:
  - postgres_data
  - sennova_storage
  - backup_data

# Healthchecks
healthchecks:
  backend:
    path: /health
    port: 8000
  frontend:
    path: /
    port: 80

# Notas para el administrador
notes: |
  Este proyecto incluye:
  - PostgreSQL 15 con backups automáticos cada 6 horas
  - Backend FastAPI con healthcheck
  - Frontend React con Nginx
  - Volúmenes persistentes para datos y archivos
  
  Variables importantes:
  1. JWT_SECRET: Mínimo 32 caracteres, cambiar en producción
  2. DB_PASSWORD: Contraseña fuerte para PostgreSQL
  3. ALLOWED_ORIGINS: Incluir dominios de Coolify separados por comas
  4. VITE_API_URL: usar /api para que el frontend pase por el proxy interno de Nginx
