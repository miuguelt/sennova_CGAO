server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check proxy - Para monitoreo de Coolify/Uptime
    location /health {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream/health;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy to backend - Comunicación interna por nombre de contenedor
    # En Docker: http://backend:8000
    # En local: no aplica (Vite proxy)
    location = /api {
        return 308 /api/;
    }

    location /api/ {
        # Resolver de Docker para resolución dinámica de nombres
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $backend_upstream "backend:8000";
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_pass_request_body on;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
