server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend (SENNOVA uses /api/v1 too?)
    # Based on the Dockerfile ARG VITE_API_URL, we might need proxying.
    # But usually Vite apps call the API directly from the browser.
    # However, for production it's better to have a proxy to avoid CORS.

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
