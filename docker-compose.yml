services:
  # ==========================================
  # Backend FastAPI
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sennova-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-sennova-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      APP_NAME: SENNOVA CGAO API
      DEBUG: "false"
      # CORS: Solo el dominio público del frontend
      # La comunicación interna (Nginx → Backend) usa proxy, no CORS
      # En Coolify: https://sennova.enlinea.sbs
      # En local: http://localhost:5173
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://sennova.enlinea.sbs}
      CVLAC_BASE_URL: ${CVLAC_BASE_URL:-http://scienti.colciencias.gov.co:8084}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
    expose:
      - ${PORT:-8000}
    volumes:
      - sennova_storage:/app/storage # Persistencia de documentos
    networks:
      - coolify
    # Healthcheck usa variable PORT para ser consistente con la configuración
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://localhost:${PORT:-8000}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Frontend React
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # En producción con proxy nginx, usamos ruta relativa /api
        # El proxy redirige /api → http://sennova-backend:8000 (comunicación interna)
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://sennova-backend:8000}
    container_name: sennova-frontend
    restart: unless-stopped
    expose:
      - 80
    environment:
      # Variables en runtime para referencia (build ya está hecho)
      - API_URL=/api
      - BACKEND_INTERNAL_URL=http://sennova-backend:8000
    networks:
      - coolify
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# Volúmenes
# ==========================================
volumes:
  sennova_storage:
    driver: local

# ==========================================
# Redes
# ==========================================
networks:
  coolify:
    external: true
