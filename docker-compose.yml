services:
  # ==========================================
  # Backend FastAPI
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sennova-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-sennova-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      APP_NAME: SENNOVA CGAO API
      DEBUG: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    expose:
      - 8000
    volumes:
      - sennova_storage:/app/storage # Persistencia de documentos
    networks:
      - coolify
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Frontend React
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: sennova-frontend
    restart: unless-stopped
    expose:
      - 80
    networks:
      - coolify
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# Volúmenes
# ==========================================
volumes:
  sennova_storage:
    driver: local

# ==========================================
# Redes
# ==========================================
networks:
  coolify:
    external: true
